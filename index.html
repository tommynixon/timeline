<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Timeline</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&amp;family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;display=swap" rel="stylesheet">
  <style>
  html, body { height: 100%; margin: 0; }
  * { box-sizing: border-box; }

  .app-root {
    height: 100%;
    width: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    background: #ede2cc;
    font-family: 'Lora', Georgia, serif;
    color: #3c3421;
  }

  .heading-font { font-family: 'Quattrocento', Georgia, serif; }

  .milestone-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, #e8c4b8 0%, #c9917e 100%);
    border: 2px solid #2a1f25;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
    --dot-shift: 0px;
    transform: translateY(var(--dot-shift));
  }
  .milestone-dot:hover, .milestone-dot.active {
    transform: translateY(var(--dot-shift)) scale(1.5);
    box-shadow: 0 0 20px rgba(232,196,184,0.6), 0 0 40px rgba(201,145,126,0.3);
    border-color: #e8c4b8;
  }

  .image-card {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }
  .image-card.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .timeline-line-h {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #c9917e 10%, #c9917e 50%, #c9917e 90%, transparent 100%);
    transform: translateY(-50%);
  }

  .timeline-line-v {
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, transparent 0%, #c9917e 5%, #c9917e 50%, #c9917e 95%, transparent 100%);
    transform: translateX(-50%);
  }

  .milestone-info {
    transition: opacity 0.3s ease;
  }

  .placeholder-img {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #c9917e99;
    letter-spacing: 0.05em;
  }

  .scroll-container::-webkit-scrollbar { height: 4px; }
  .scroll-container::-webkit-scrollbar-track { background: transparent; }
  .scroll-container::-webkit-scrollbar-thumb { background: #c9917e44; border-radius: 4px; }

  @keyframes softPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }
  .glow-bg {
    animation: softPulse 6s ease-in-out infinite;
  }

  @media (max-width: 767px) {
    .milestone-dot { width: 14px; height: 14px; }
  }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="app-root" id="app">
   <!-- Ambient glow -->
   <div class="glow-bg" style="position:fixed;top:-30%;left:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(201,145,126,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>
   <div class="glow-bg" style="position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(180,130,160,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;animation-delay:3s;"></div>
   <div style="position:relative;z-index:1;" class="py-10 md:py-16 px-4">
    <!-- Header -->
    <div class="text-center mb-10 md:mb-14">
     <p class="text-xs tracking-[0.3em] uppercase mb-3" style="color:#3c3421;" id="subtitleEl">Est. 2021.</p>
     <h1 class="heading-font text-3xl md:text-5xl mb-2" style="color:#3c3421;text-transform:uppercase;letter-spacing:0.2em;font-weight:400;" id="titleEl">The Betrothed</h1>
     <div class="mx-auto mt-4" style="width:60px;height:1px;background:linear-gradient(90deg,transparent,#c9917e,transparent);"></div>
    </div><!-- Image Card (Desktop: fixed top area, Mobile: inline) -->
    <div class="max-w-md mx-auto mb-8 md:mb-12 image-card" id="imageCard">
     <div style="background:#2a1f25;border:1px solid #3d2e36;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 60px rgba(201,145,126,0.08);">
      <div id="cardImage" class="placeholder-img" style="background:linear-gradient(135deg,#2a1f25,#3d2e36);">
       <span>Select a milestone</span>
      </div>
      <div class="p-5 text-center">
       <p class="text-xs tracking-[0.2em] uppercase mb-1" style="color:#c9917e;" id="cardYear"></p>
       <h3 class="heading-font text-xl font-bold mb-1" style="color:#f5e6e0;" id="cardTitle"></h3>
       <p class="text-sm" style="color:#b8a0a8;" id="cardDesc"></p>
      </div>
     </div>
    </div><!-- Desktop horizontal timeline -->
    <div class="hidden md:block">
     <div class="scroll-container" style="overflow-x:auto;padding:40px 20px;">
      <div style="position:relative;min-width:max-content;display:flex;align-items:center;gap:48px;padding:0 40px;">
       <div class="timeline-line-h"></div>
       <div id="desktopMilestones" style="display:flex;align-items:center;gap:48px;position:relative;z-index:2;"></div>
      </div>
     </div>
    </div><!-- Mobile vertical timeline -->
    <div class="md:hidden px-4">
     <div style="position:relative;" id="mobileTimeline">
      <div class="timeline-line-v"></div>
      <div id="mobileMilestones" class="flex flex-col items-center gap-6" style="position:relative;z-index:2;"></div>
     </div>
    </div>
   </div>
  </div>
  <script>
// ============================================================
// MILESTONE DATA — Replace placeholder colors/images here
// ============================================================
const milestones = [
  { year: "2015", title: "First Glance", desc: "Eyes met across a crowded bookshop on a rainy afternoon.", color: "#4a3040" },
  { year: "2015", title: "First Date", desc: "Coffee turned into dinner, dinner turned into stargazing.", color: "#3d3045" },
  { year: "2016", title: "First Trip", desc: "A weekend in the countryside sealed what words couldn't.", color: "#2e3848" },
  { year: "2016", title: "Meeting the Family", desc: "Nervous laughter, warm hugs, and homemade pie.", color: "#3a3035" },
  { year: "2017", title: "Moving In", desc: "Two lives, one tiny apartment, a thousand little joys.", color: "#35303d" },
  { year: "2017", title: "The Puppy", desc: "Our first shared responsibility—and unconditional love.", color: "#303838" },
  { year: "2018", title: "Anniversary Abroad", desc: "Venice canals and whispered promises at sunset.", color: "#3d2e36" },
  { year: "2018", title: "Career Leap", desc: "Supporting each other through late nights and big dreams.", color: "#2e3040" },
  { year: "2019", title: "The Question", desc: "Under fairy lights in our garden—forever began.", color: "#4a3040" },
  { year: "2019", title: "Engagement Party", desc: "Champagne toasts and happy tears with everyone we love.", color: "#3a2e38" },
  { year: "2020", title: "Pandemic Love", desc: "Lockdown taught us that home is wherever we're together.", color: "#333038" },
  { year: "2020", title: "Balcony Dinners", desc: "Candlelit meals above an empty city, just the two of us.", color: "#382e35" },
  { year: "2021", title: "New Home", desc: "A garden, a porch swing, and room for the future.", color: "#2e3535" },
  { year: "2021", title: "Saying Yes", desc: "Choosing each other, again and again, every single day.", color: "#3d3040" },
  { year: "2022", title: "Venue Found", desc: "An old vineyard with golden light and climbing roses.", color: "#40302e" },
  { year: "2022", title: "Dress & Suit", desc: "Secret fittings and the thrill of imagining the day.", color: "#352e3d" },
  { year: "2023", title: "Save the Date", desc: "Watercolor invitations sent with love to our dearest.", color: "#303540" },
  { year: "2023", title: "Rehearsal Dinner", desc: "Stories told, tears shed, and so much laughter.", color: "#3d352e" },
  { year: "2024", title: "The Wedding", desc: "Two hearts, one promise, a lifetime of tomorrows.", color: "#4a3535" },
  { year: "2024", title: "Happily Ever After", desc: "And so our greatest adventure begins…", color: "#3d2e30" },
  { year: "2025", title: "First Dance", desc: "Swaying under twinkling lights, the world fell away.", color: "#3a3844" },
  { year: "2025", title: "New Chapter", desc: "Every sunrise feels like a promise kept.", color: "#45333d" },
  { year: "2025", title: "Growing Together", desc: "Building dreams, one day at a time.", color: "#353d35" },
  { year: "2026", title: "Adventures Await", desc: "Boarding planes, holding hands, chasing sunsets.", color: "#3d3a2e" },
  { year: "2026", title: "Home Sweet Home", desc: "Making memories in spaces filled with love.", color: "#2e3a3d" },
  { year: "2027", title: "One Year Strong", desc: "Celebrating the gift of us, every single day.", color: "#3d2d35" },
  { year: "2027", title: "Dreams Realized", desc: "The future looks brighter with you by my side.", color: "#3a3536" },
  { year: "2028", title: "Forever & Beyond", desc: "Still writing our story, one beautiful chapter at a time.", color: "#453038" },
  { year: "2028", title: "Legacy of Love", desc: "Creating something timeless, something true.", color: "#303d3a" },
  { year: "2029", title: "Infinity", desc: "With you, every moment is exactly where I'm meant to be.", color: "#3d3842" },
];

let activeIndex = -1;

function selectMilestone(i) {
  if (activeIndex === i) return;
  activeIndex = i;
  const m = milestones[i];

  // Update card
  const card = document.getElementById('imageCard');
  const cardImage = document.getElementById('cardImage');
  const cardYear = document.getElementById('cardYear');
  const cardTitle = document.getElementById('cardTitle');
  const cardDesc = document.getElementById('cardDesc');

  card.classList.add('visible');
  cardImage.style.background = `linear-gradient(135deg, ${m.color}, ${lighten(m.color)})`;
  cardImage.innerHTML = `<span style="font-size:12px;">Replace with image #${i+1}</span>`;
  cardYear.textContent = m.year;
  cardTitle.textContent = m.title;
  cardDesc.textContent = m.desc;

  // Update dots
  document.querySelectorAll('.milestone-dot').forEach((dot, idx) => {
    dot.classList.toggle('active', idx % 20 === i); // handles both desktop & mobile sets
  });
}

function lighten(hex) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + 40);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + 40);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + 40);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function buildTimeline() {
  const desktop = document.getElementById('desktopMilestones');
  const mobile = document.getElementById('mobileMilestones');

  milestones.forEach((m, i) => {
    // Desktop
    const dEl = document.createElement('div');
    dEl.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;';
    const above = i % 2 === 0;
    dEl.innerHTML = `
      <div class="milestone-info" style="text-align:center;order:${above ? 0 : 2};min-width:80px;${above ? 'margin-bottom:20px;padding-bottom:4px;' : 'margin-top:20px;padding-top:7px;'}">
        <p style="font-size:11px;letter-spacing:0.15em;color:#3c3421;">${m.year}</p>
        <p class="heading-font" style="font-size:14px;font-weight:600;color:#3c3421;white-space:nowrap;">${m.title}</p>
      </div>
      <div class="milestone-dot" data-idx="${i}" style="order:1;--dot-shift:${above ? '-8px' : '8px'};"></div>
    `;
    dEl.addEventListener('mouseenter', () => selectMilestone(i));
    dEl.addEventListener('click', () => selectMilestone(i));
    desktop.appendChild(dEl);

    // Mobile
    const mEl = document.createElement('div');
    mEl.style.cssText = 'display:flex;align-items:center;gap:12px;width:100%;';
    const leftSide = i % 2 === 0;
    mEl.innerHTML = `
      <div class="milestone-info" style="flex:1;text-align:${leftSide ? 'right' : 'left'};order:${leftSide ? 0 : 2};">
        <p style="font-size:10px;letter-spacing:0.15em;color:#3c3421;">${m.year}</p>
        <p class="heading-font" style="font-size:13px;font-weight:600;color:#3c3421;">${m.title}</p>
        <p style="font-size:11px;color:#3c3421;line-height:1.4;">${m.desc}</p>
      </div>
      <div class="milestone-dot" data-idx="${i}" style="order:1;"></div>
      <div style="flex:1;order:${leftSide ? 2 : 0};"></div>
    `;
    mEl.addEventListener('click', () => selectMilestone(i));
    mobile.appendChild(mEl);
  });
}

buildTimeline();

// Default selection
selectMilestone(0);

// Element SDK
const defaultConfig = {
  timeline_title: "The Betrothed",
  timeline_subtitle: "Est. 2021.",
  background_color: "#ede2cc",
  surface_color: "#2a1f25",
  text_color: "#f5e6e0",
  accent_color: "#c9917e",
  secondary_text_color: "#b8a0a8",
  font_family: "Quattrocento",
  font_size: 16
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('titleEl').textContent = c.timeline_title;
  document.getElementById('subtitleEl').textContent = c.timeline_subtitle;

  const root = document.getElementById('app');
  root.style.background = c.background_color;

  document.getElementById('titleEl').style.color = "#3c3421";
  document.getElementById('titleEl').style.fontFamily = `${c.font_family}, Quattrocento, Georgia, serif`;
  document.getElementById('titleEl').style.fontSize = `${c.font_size * 2.5}px`;
  document.getElementById('subtitleEl').style.color = "#3c3421";
  document.getElementById('subtitleEl').style.fontSize = `${c.font_size * 0.75}px`;

  document.querySelectorAll('.heading-font').forEach(el => {
    el.style.fontFamily = `${c.font_family}, Quattrocento, Georgia, serif`;
  });

  const cardBg = document.querySelector('#imageCard > div');
  if (cardBg) {
    cardBg.style.background = c.surface_color;
    cardBg.style.borderColor = c.accent_color + '33';
  }
  const cardTitle = document.getElementById('cardTitle');
  if (cardTitle) cardTitle.style.color = c.text_color;
  const cardYear = document.getElementById('cardYear');
  if (cardYear) cardYear.style.color = c.accent_color;
  const cardDesc = document.getElementById('cardDesc');
  if (cardDesc) cardDesc.style.color = c.secondary_text_color;
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
        { get: () => config.secondary_text_color || defaultConfig.secondary_text_color, set: (v) => { config.secondary_text_color = v; window.elementSdk.setConfig({ secondary_text_color: v }); } },
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
    }),
    mapToEditPanelValues: (config) => new Map([
      ["timeline_title", config.timeline_title || defaultConfig.timeline_title],
      ["timeline_subtitle", config.timeline_subtitle || defaultConfig.timeline_subtitle],
    ])
  });
}

lucide.createIcons();
</script>
